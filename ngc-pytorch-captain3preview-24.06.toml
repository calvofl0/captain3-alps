image = "${SCRATCH}/captain3/ngc-pytorch-captain3preview-24.06.sqsh"

mounts = [
    "/capstor",
    "/iopsstor",
    "/dev/shm/${USER}",
    "${HOME}/.ssh",
    "${HOME}/captain3-alps"
] 

workdir = "${HOME}/captain3-alps"

[annotations]
com.hooks.aws_ofi_nccl.enabled = "true" 
com.hooks.aws_ofi_nccl.variant = "cuda12"

[env]
NCCL_DEBUG = "INFO" 
CUDA_CACHE_DISABLE = "1" 
TORCH_NCCL_ASYNC_ERROR_HANDLING = "1" 
MPICH_GPU_SUPPORT_ENABLED = "0" 
